name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv pip install --system -e .
          uv pip install --system pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Verify imports
        run: |
          python -c "from glm2api.app import create_application; print('imports OK')"
          python -c "from glm2api.admin.api import handle_admin_request; print('admin imports OK')"
          python -c "from glm2api.core.model_variants import expand_model_variants; print('core imports OK')"
          python -c "from glm2api.protocol.tool_parser import StreamingToolParser; print('protocol imports OK')"
