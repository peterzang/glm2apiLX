# Render 部署配置文件
# 文档: https://render.com/docs/blueprint-spec
# 使用方式: 在 Render Dashboard 创建新项目时选择 "Blueprint" 并关联此文件

services:
  - type: web
    name: glm2api
    runtime: python
    # Python 版本（pyproject.toml 要求 >=3.12）
    pythonVersion: "3.12"
    # 构建命令：安装依赖
    buildCommand: pip install -e .
    # 启动命令：绑定 0.0.0.0:$PORT，Render 会注入 PORT 环境变量
    startCommand: python main.py
    # 健康检查
    healthCheckPath: /health
    healthCheckTimeout: 10
    # 自动部署：关联 GitHub 仓库后，push 到 main 分支自动触发部署
    autoDeploy: true
    # 环境变量（在 Render Dashboard 中设置，不要提交到 git）
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        # Render 会自动注入 PORT，这里仅声明
        fromRenderEnv: PORT
      - key: GLM_USE_GUEST_REFRESH_TOKEN
        value: "true"
      - key: GLM_MAX_CONCURRENCY
        value: "8"
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG_DUMP_ALL
        value: "false"
      - key: ADMIN_PASSWORD
        # 在 Render Dashboard 中手动设置（敏感信息不提交到 git）
        sync: false
      - key: SERVER_API_KEYS
        # 在 Render Dashboard 中手动设置（敏感信息不提交到 git）
        sync: false
    # 资源配置（Render 免费版 512MB 内存）
    plan: free
    # 环境变量分组（可选）
    envVarsGroup: production
